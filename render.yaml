services:
  - type: web
    name: highschool-lms
    env: node
    buildCommand: npm install && npm run build
    startCommand: npx serve -s dist
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: "/**"
        destination: "/index.html"
    envVars:
      - key: VITE_SUPABASE_URL
        scope: build
      - key: VITE_SUPABASE_KEY
        scope: build